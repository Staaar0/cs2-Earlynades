name: Build & Release EarlyNades

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Required so the workflow can create tags + releases.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore EarlyNades/EarlyNades.csproj

      - name: Publish (Release)
        run: dotnet publish EarlyNades/EarlyNades.csproj -c Release -o publish --no-restore

      - name: Package plugin
        run: |
          PLUGIN_DIR="package/addons/counterstrikesharp/plugins/EarlyNades"
          mkdir -p "$PLUGIN_DIR"
          cp publish/EarlyNades.dll "$PLUGIN_DIR/"
          (cd package && zip -r "../EarlyNades-v1.0.${{ github.run_number }}.zip" addons)

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: EarlyNades v1.0.${{ github.run_number }}
          files: EarlyNades-v1.0.${{ github.run_number }}.zip
          generate_release_notes: true
