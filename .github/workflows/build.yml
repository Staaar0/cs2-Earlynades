name: Build EarlyNades

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore EarlyNades/EarlyNades.csproj

      - name: Build (Release)
        run: dotnet build EarlyNades/EarlyNades.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish EarlyNades/EarlyNades.csproj -c Release -o publish/EarlyNades --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EarlyNades
          # The file you actually need is EarlyNades.dll inside this folder.
          path: publish/EarlyNades
